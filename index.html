// ─── Random Engine ───────────────────────────────────────────────
function hash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  return Math.abs(h);
}

// Seeded PRNG (mulberry32) for reproducible-per-call but unique-per-click
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = t + Math.imul(t ^ (t >>> 7), 61 | t) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

let generationCount = 0;

function pick(arr, rng) {
  return arr[Math.floor(rng() * arr.length)];
}

function generateStory(name, job) {
  const salt = generationCount++ + Date.now();
  const seed = hash(name.toLowerCase() + job.toLowerCase() + String(salt));
  const rng = mulberry32(seed);

  const n       = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();
  const city    = pick(cities, rng);
  const career  = pick(careers, rng);
  const family  = pick(families, rng);
  const hobby   = pick(hobbies, rng);
  const closer  = pick(closers, rng);

  return `In this life, ${n} is ${career} in ${city}. ${n} is ${family}. ${n} ${hobby}. ${closer}`;
}

  'Searching your other life...',

function showState(state) {
  inputCard.style.display    = state === 'input'   ? 'block' : 'none';
  loadingState.style.display = state === 'loading'  ? 'flex'  : 'none';
  resultCard.style.display   = state === 'result'   ? 'block' : 'none';
}

const toastMsg = document.getElementById('toastMsg');
function showToast(msg) {
  toastMsg.textContent = msg || 'Copied to clipboard';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

submitBtn.addEventListener('click', handleSubmit);
nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleSubmit(); });
jobInput.addEventListener('keydown',  e => { if (e.key === 'Enter') handleSubmit(); });

function handleSubmit() {
  const name = nameInput.value.trim();
  const job  = jobInput.value.trim();

  if (!name || !job) {
    errorMsg.style.display = 'block';
    return;
  }
  errorMsg.style.display = 'none';

  // Show loading
  showState('loading');
  let msgIdx = 0;
  loadingMsg.textContent = loadingMessages[0];
  const msgInterval = setInterval(() => {
    msgIdx = (msgIdx + 1) % loadingMessages.length;
    loadingMsg.textContent = loadingMessages[msgIdx];
  }, 1800);

  // Simulate a brief generation delay (feels more intentional)
  const delay = 1800 + Math.random() * 1200;
  setTimeout(() => {
    clearInterval(msgInterval);

    const story = generateStory(name, job);
    const displayName = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();

    resultName.textContent = displayName;
    storyText.innerHTML = '<span class="drop-cap">' + story.charAt(0) + '</span>' + story.slice(1);

    showState('result');
  }, delay);
}

tryAgainBtn.addEventListener('click', () => {
  showState('input');
  nameInput.focus();
});

closeBtn.addEventListener('click', () => {
  showState('input');
  nameInput.focus();
});

// Copy text to clipboard
copyBtn.addEventListener('click', () => {
  const story = storyText.textContent;
  const text = story + '\n\nmyotherme.app';
  navigator.clipboard.writeText(text).then(showToast).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast();
  });
});

// Detect mobile (touch device with small screen)
const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

// Generate shareable IG Stories image
shareBtn.addEventListener('click', async () => {
  shareBtn.classList.add('generating');
  shareBtn.textContent = 'Generating...';

  // Populate the hidden share card
  const displayName = resultName.textContent;
  const story = storyText.textContent;
  scName.textContent = displayName;
  scStory.innerHTML = '<span class="sc-drop">' + story.charAt(0) + '</span>' + story.slice(1);

  // Small delay to let fonts render in the offscreen card
  await new Promise(r => setTimeout(r, 300));

  try {
    const canvas = await html2canvas(shareCard, {
      width: 1080,
      height: 1920,
      scale: 1,
      backgroundColor: '#0A0A0F',
      useCORS: true,
      logging: false,
    });

    // Convert to blob
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    const file = new File([blob], 'my-other-life.png', { type: 'image/png' });

    // Mobile: use native share sheet (IG Stories, WhatsApp, etc.)
    // Desktop: always download directly
    if (isMobile && navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        files: [file],
        title: 'My Other Life — MyOtherMe',
        text: 'Discover your parallel life at myotherme.app',
      });
    } else {
      // Download the image
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'my-other-life.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('Image saved — share it!');
    }
  } catch (err) {
    // User cancelled share or error — fail silently
    if (err.name !== 'AbortError') console.error('Share error:', err);
  }

  shareBtn.classList.remove('generating');
  shareBtn.textContent = 'Share image';
});
</script>
</body>
</html>
